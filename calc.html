<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://fonts.googleapis.com/css?family=Istok+Web' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <title>Career Selection</title>
</head>
<body>
    <header>
        <div class="header-container">
            <img src="eecu-logo 1.png" alt="Background image for landing page" class="eecu-logo">
            <h1 class="top">EECU Wise-Up Budget Calculator</h1>
        </div>
    </header>
    <h1>Career Selection</h1>
    <p>Choose a career path to see the average salary and job outlook.</p>

    <select id="career-select">
        <option value="">Select a career</option>
        <option value="software-engineer">Software Engineer</option>
        <option value="nurse">Nurse</option>
        <option value="teacher">Teacher</option>
        <option value="data-scientist">Data Scientist</option>
    </select>

    <div id="career-info">
        <!-- Career information will be displayed here -->
    </div>
<script src="chart.js"></script>
</body>
</html>
